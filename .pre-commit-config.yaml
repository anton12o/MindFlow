repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
        stages: [pre-commit]
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: python -m pytest -x -q backend/tests/
        language: system
        pass_filenames: false
        stages: [pre-commit]
